<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY | SELECTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, 'Helvetica Neue', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 440px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid #222;
        }
        
        .header h1 {
            font-size: 34px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        
        .header p {
            color: #888;
            font-size: 15px;
            font-weight: 400;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: #141414;
            border-radius: 14px;
            padding: 18px 16px;
            border: 1px solid #222;
            transition: all 0.2s;
        }
        
        .stat-card:hover {
            border-color: #444;
        }
        
        .stat-label {
            color: #888;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
        }
        
        .stat-number small {
            font-size: 16px;
            color: #666;
            font-weight: 400;
            margin-left: 4px;
        }
        
        /* Protocol Selector */
        .section-title {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 14px;
            letter-spacing: -0.2px;
        }
        
        .protocol-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 28px;
        }
        
        .protocol-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .protocol-card:hover {
            border-color: #666;
            background: #1a1a1a;
        }
        
        .protocol-card.active {
            background: #fff;
            border-color: #fff;
        }
        
        .protocol-card.active .protocol-name {
            color: #000;
            font-weight: 600;
        }
        
        .protocol-card.active .protocol-count {
            color: #333;
        }
        
        .protocol-name {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .protocol-count {
            font-size: 13px;
            color: #888;
        }
        
        /* Timer */
        .timer-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .timer-label {
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 10px;
        }
        
        .timer-display {
            font-size: 38px;
            font-weight: 500;
            color: #fff;
            font-family: 'SF Mono', 'Monaco', monospace;
            letter-spacing: 2px;
        }
        
        .timer-note {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
        
        /* Button */
        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
            background: #eee;
        }
        
        .btn:disabled {
            background: #222;
            color: #666;
            pointer-events: none;
            border: 1px solid #333;
        }
        
        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid #333;
        }
        
        .btn-secondary:active {
            background: #1a1a1a;
        }
        
        /* Proxy Card */
        .proxy-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            margin: 20px 0;
        }
        
        .proxy-ip {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            font-family: 'SF Mono', 'Monaco', monospace;
            word-break: break-all;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .proxy-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
        }
        
        .tag.protocol {
            background: #fff;
            color: #000;
            border: none;
            font-weight: 600;
        }
        
        .tag.country {
            background: #222;
            border-color: #444;
        }
        
        .tag.level {
            background: #2a2a2a;
            border-color: #555;
        }
        
        .tag.city {
            background: #1a1a1a;
            border-color: #3a3a3a;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 0;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading p {
            color: #888;
            font-size: 15px;
        }
        
        /* Error */
        .error {
            text-align: center;
            padding: 40px 0;
        }
        
        .error h3 {
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .error p {
            color: #888;
            margin-bottom: 24px;
        }
        
        /* Note */
        .note {
            color: #666;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
        }
        
        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ========== КОНФИГ ==========
        const BOT_TOKEN = '8682719938:AAEFdbbXez_0f7M87QvzcTf5gm7Mybl6Eho';
        const BOT_USERNAME = 'FriendTest54Bot';
        const ADMIN_ID = 123456789;
        
        const BIN_ID = '69ab380043b1c97be9bb3caa';
        const API_KEY = '$2a$10$F0cAPsC5hR7IdQ2aLV4CDeUmRXIX7F1lk1FYcF/WO4zLjpS4yCu3a';
        
        const PROXY_FILES = [
            'proxy/proxy1.json',
            'proxy/proxy2.json'
        ];
        
        let selectedProtocol = 'all';
        let allProxies = [];
        
        // ========== ЗАГРУЗКА ПРОКСИ ==========
        async function loadAllProxies() {
            let proxies = [];
            
            for (const file of PROXY_FILES) {
                try {
                    const res = await fetch(file);
                    if (res.ok) {
                        const data = await res.json();
                        const converted = convertProxy(data);
                        proxies = proxies.concat(converted);
                    }
                } catch (e) {
                    console.log(`Error loading ${file}:`, e);
                }
            }
            
            return proxies;
        }
        
        function convertProxy(data) {
            if (!Array.isArray(data)) return [];
            
            return data.map(item => {
                // Формат 1 (IP/PORT заглавные)
                if (item.IP && item.PORT) {
                    let protocol = (item.PROTOCOL || 'http').toLowerCase();
                    return {
                        ip: item.IP,
                        port: item.PORT,
                        country: item.COUNTRY || 'Unknown',
                        countryShort: item.COUNTRY_SHORT || '',
                        protocol: protocol,
                        type: protocol === 'socks5' ? 'SOCKS5' : 
                               protocol === 'socks4' ? 'SOCKS4' : 
                               protocol === 'https' ? 'HTTPS' : 'HTTP',
                        city: '',
                        level: 'Standard'
                    };
                }
                
                // Формат 2 (ip/port строчные)
                if (item.ip && item.port) {
                    let protocol = 'http';
                    if (item.type?.toLowerCase().includes('socks5')) protocol = 'socks5';
                    else if (item.type?.toLowerCase().includes('socks4')) protocol = 'socks4';
                    else if (item.type?.toLowerCase().includes('https')) protocol = 'https';
                    
                    return {
                        ip: item.ip,
                        port: item.port,
                        country: item.country || 'Unknown',
                        city: item.city || '',
                        state: item.state || '',
                        level: item.level || 'Standard',
                        protocol: protocol,
                        type: protocol === 'socks5' ? 'SOCKS5' : 
                               protocol === 'socks4' ? 'SOCKS4' : 
                               protocol === 'https' ? 'HTTPS' : 'HTTP'
                    };
                }
                
                return null;
            }).filter(p => p);
        }
        
        // ========== ФИЛЬТРАЦИЯ ПО ПРОТОКОЛУ ==========
        function getProxiesByProtocol(protocol) {
            if (protocol === 'all') return allProxies;
            return allProxies.filter(p => p.protocol === protocol);
        }
        
        function getProtocolCount(protocol) {
            if (protocol === 'all') return allProxies.length;
            return allProxies.filter(p => p.protocol === protocol).length;
        }
        
        // ========== ПРОВЕРКА ПРОКСИ ==========
        async function checkProxy(proxy) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(Math.random() > 0.3);
                }, 150);
            });
        }
        
        // ========== ПОЛУЧЕНИЕ ЛУЧШЕГО ПО ВЫБРАННОМУ ПРОТОКОЛУ ==========
        async function getBestProxyByProtocol(protocol) {
            const filtered = getProxiesByProtocol(protocol);
            if (filtered.length === 0) return null;
            
            const shuffled = filtered.sort(() => 0.5 - Math.random());
            const toCheck = shuffled.slice(0, 10);
            
            for (const proxy of toCheck) {
                const working = await checkProxy(proxy);
                if (working) return proxy;
            }
            
            return null;
        }
        
        // ========== JSONBIN ==========
        async function loadUsers() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                return data.record?.users || {};
            } catch {
                return {};
            }
        }
        
        async function saveUsers(users) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ users })
                });
            } catch (e) {}
        }
        
        // ========== TELEGRAM ==========
        async function sendToTelegram(chatId, text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' })
                });
            } catch (e) {}
        }
        
        // ========== ОСНОВНОЙ ЭКРАН ==========
        async function showMain() {
            const user = tg.initDataUnsafe?.user;
            if (!user?.id) {
                document.getElementById('app').innerHTML = '<div class="container"><div class="header"><h1>ERROR</h1><p>Open via Telegram</p></div></div>';
                return;
            }
            
            // Загружаем прокси один раз
            if (allProxies.length === 0) {
                allProxies = await loadAllProxies();
            }
            
            const users = await loadUsers();
            const userData = users[user.id] || { lastGet: 0, count: 0 };
            
            const now = Date.now();
            const fiveDays = 5 * 24 * 60 * 60 * 1000;
            const timeLeft = (userData.lastGet + fiveDays) - now;
            
            // Считаем по протоколам
            const httpCount = getProtocolCount('http');
            const httpsCount = getProtocolCount('https');
            const socks5Count = getProtocolCount('socks5');
            const socks4Count = getProtocolCount('socks4');
            
            let html = `
                <div class="header">
                    <h1>PROXY SELECTOR</h1>
                    <p>@${user.username || 'user'} • получено ${userData.count || 0}</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Доступно</div>
                        <div class="stat-number">${allProxies.length}<small>шт</small></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Ваш лимит</div>
                        <div class="stat-number">1<small>/5д</small></div>
                    </div>
                </div>
                
                <div class="section-title">Выберите протокол</div>
                
                <div class="protocol-grid">
                    <div class="protocol-card ${selectedProtocol === 'all' ? 'active' : ''}" onclick="selectProtocol('all')">
                        <div class="protocol-name">ALL</div>
                        <div class="protocol-count">${allProxies.length}</div>
                    </div>
                    <div class="protocol-card ${selectedProtocol === 'http' ? 'active' : ''}" onclick="selectProtocol('http')">
                        <div class="protocol-name">HTTP</div>
                        <div class="protocol-count">${httpCount}</div>
                    </div>
                    <div class="protocol-card ${selectedProtocol === 'https' ? 'active' : ''}" onclick="selectProtocol('https')">
                        <div class="protocol-name">HTTPS</div>
                        <div class="protocol-count">${httpsCount}</div>
                    </div>
                    <div class="protocol-card ${selectedProtocol === 'socks5' ? 'active' : ''}" onclick="selectProtocol('socks5')">
                        <div class="protocol-name">SOCKS5</div>
                        <div class="protocol-count">${socks5Count}</div>
                    </div>
                    <div class="protocol-card ${selectedProtocol === 'socks4' ? 'active' : ''}" onclick="selectProtocol('socks4')">
                        <div class="protocol-name">SOCKS4</div>
                        <div class="protocol-count">${socks4Count}</div>
                    </div>
                </div>
            `;
            
            if (timeLeft <= 0 || !userData.lastGet) {
                html += `
                    <div class="timer-card">
                        <div class="timer-label">Можно взять</div>
                        <div class="timer-display">✓</div>
                        <div class="timer-note">1 прокси каждые 5 дней</div>
                    </div>
                    <button class="btn" onclick="getProxy()">ПОЛУЧИТЬ ${selectedProtocol.toUpperCase()}</button>
                `;
            } else {
                const days = Math.floor(timeLeft / (24*60*60*1000));
                const hours = Math.floor((timeLeft % (24*60*60*1000)) / (60*60*1000));
                
                html += `
                    <div class="timer-card">
                        <div class="timer-label">Следующий через</div>
                        <div class="timer-display">${days}д ${hours}ч</div>
                        <div class="timer-note">Лимит: 1 прокси / 5 дней</div>
                    </div>
                    <button class="btn" disabled>ЛИМИТ ИСЧЕРПАН</button>
                `;
            }
            
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== ВЫБОР ПРОТОКОЛА ==========
        window.selectProtocol = function(protocol) {
            selectedProtocol = protocol;
            showMain();
        };
        
        // ========== ПОЛУЧИТЬ ПРОКСИ ==========
        window.getProxy = async function() {
            const user = tg.initDataUnsafe?.user;
            
            document.getElementById('app').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Поиск ${selectedProtocol.toUpperCase()} прокси...</p>
                </div>
            `;
            
            const proxy = await getBestProxyByProtocol(selectedProtocol);
            
            if (!proxy) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <h3>Нет рабочих прокси</h3>
                        <p>Для протокола ${selectedProtocol.toUpperCase()}</p>
                        <button class="btn btn-secondary" onclick="showMain()">НАЗАД</button>
                    </div>
                `;
                return;
            }
            
            // Сохраняем
            const users = await loadUsers();
            users[user.id] = {
                lastGet: Date.now(),
                count: (users[user.id]?.count || 0) + 1
            };
            await saveUsers(users);
            
            // Уведомление
            await sendToTelegram(
                ADMIN_ID,
                `🎁 ${user.username || 'Пользователь'} взял ${proxy.type}\n${proxy.ip}:${proxy.port} • ${proxy.country}`
            );
            
            // Теги
            let tags = `
                <span class="tag protocol">${proxy.type}</span>
                <span class="tag country">${proxy.countryShort || proxy.country.slice(0, 2).toUpperCase()}</span>
            `;
            
            if (proxy.level && proxy.level !== 'Standard') {
                tags += `<span class="tag level">${proxy.level}</span>`;
            }
            
            if (proxy.city) {
                tags += `<span class="tag city">${proxy.city}</span>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>ПРОКСИ ГОТОВ</h1>
                    <p>${proxy.type} • проверен</p>
                </div>
                
                <div class="proxy-card">
                    <div class="proxy-ip">${proxy.ip}:${proxy.port}</div>
                    <div class="proxy-tags">
                        ${tags}
                    </div>
                </div>
                
                <button class="btn" onclick="copyProxy('${proxy.ip}:${proxy.port}')">КОПИРОВАТЬ</button>
                <button class="btn btn-secondary" onclick="showMain()">НОВЫЙ ВЫБОР</button>
                
                <div class="note">
                    Следующий прокси через 5 дней
                </div>
            `;
        };
        
        // ========== КОПИРОВАТЬ ==========
        window.copyProxy = function(proxy) {
            navigator.clipboard?.writeText(proxy);
            tg.showPopup({ 
                title: 'Скопировано', 
                message: 'Прокси в буфере обмена',
                buttons: [{ type: 'ok' }]
            });
        };
        
        // ========== СТАРТ ==========
        showMain();
    </script>
</body>
</html>
