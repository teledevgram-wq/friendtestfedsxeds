<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY | BOT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
        }
        
        body {
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            padding: 24px;
        }
        
        .container {
            max-width: 440px;
            margin: 0 auto;
        }
        
        /* Хедер */
        .header {
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.3px;
        }
        
        .header p {
            color: #666;
            font-size: 15px;
            margin-top: 4px;
        }
        
        /* Статистика */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px;
            flex: 1;
        }
        
        .stat-label {
            color: #444;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: #000;
        }
        
        /* Таймер */
        .timer-card {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 32px;
        }
        
        .timer-label {
            color: #444;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        
        .timer-display {
            font-size: 36px;
            font-weight: 500;
            color: #000;
            font-family: monospace;
            letter-spacing: 2px;
        }
        
        .timer-note {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
        
        /* Кнопка */
        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.2s;
        }
        
        .btn:active {
            background: #333;
            transform: scale(0.98);
        }
        
        .btn:disabled {
            background: #ccc;
            color: #666;
            pointer-events: none;
        }
        
        .btn-secondary {
            background: #e5e5e5;
            color: #000;
        }
        
        .btn-secondary:active {
            background: #d5d5d5;
        }
        
        /* Прокси карточка */
        .proxy-card {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 24px;
            margin: 24px 0;
        }
        
        .proxy-ip {
            font-size: 24px;
            font-weight: 600;
            color: #000;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 16px;
        }
        
        .proxy-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            background: #e5e5e5;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }
        
        .tag.protocol {
            background: #000;
            color: #fff;
        }
        
        .tag.country {
            background: #d4d4d4;
        }
        
        .tag.level {
            background: #bdbdbd;
        }
        
        .tag.city {
            background: #eaeaea;
        }
        
        /* Уведомления */
        .note {
            color: #666;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }
        
        /* Загрузка */
        .loading {
            text-align: center;
            padding: 48px 0;
        }
        
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e5e5e5;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Сообщения */
        .error {
            text-align: center;
            padding: 40px 0;
        }
        
        .error h2 {
            font-size: 20px;
            font-weight: 500;
            color: #000;
            margin-bottom: 8px;
        }
        
        .error p {
            color: #666;
            margin-bottom: 24px;
        }
        
        hr {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 24px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ========== КОНФИГ ==========
        const BOT_TOKEN = '8682719938:AAEFdbbXez_0f7M87QvzcTf5gm7Mybl6Eho';
        const BOT_USERNAME = 'FriendTest54Bot';
        const ADMIN_ID = 123456789;
        
        const BIN_ID = '69ab380043b1c97be9bb3caa';
        const API_KEY = '$2a$10$F0cAPsC5hR7IdQ2aLV4CDeUmRXIX7F1lk1FYcF/WO4zLjpS4yCu3a';
        
        const PROXY_FILES = [
            'proxy/proxy1.json',
            'proxy/proxy2.json'
        ];
        
        // ========== ЗАГРУЗКА ПРОКСИ ==========
        async function loadAllProxies() {
            let allProxies = [];
            
            for (const file of PROXY_FILES) {
                try {
                    const res = await fetch(file);
                    if (res.ok) {
                        const data = await res.json();
                        const converted = convertProxy(data);
                        allProxies = allProxies.concat(converted);
                    }
                } catch (e) {
                    console.log(`Error loading ${file}:`, e);
                }
            }
            
            return allProxies;
        }
        
        function convertProxy(data) {
            if (!Array.isArray(data)) return [];
            
            return data.map(item => {
                // Формат 1 (с IP/PORT)
                if (item.IP && item.PORT) {
                    return {
                        ip: item.IP,
                        port: item.PORT,
                        country: item.COUNTRY || 'Unknown',
                        countryShort: item.COUNTRY_SHORT || '',
                        protocol: (item.PROTOCOL || 'http').toLowerCase(),
                        type: (item.PROTOCOL || 'HTTP').toUpperCase(),
                        city: '',
                        level: 'Standard'
                    };
                }
                
                // Формат 2 (с ip/port)
                if (item.ip && item.port) {
                    return {
                        ip: item.ip,
                        port: item.port,
                        country: item.country || 'Unknown',
                        city: item.city || '',
                        state: item.state || '',
                        level: item.level || 'Standard',
                        protocol: item.type?.toLowerCase() || 'http',
                        type: item.type || 'HTTP'
                    };
                }
                
                return null;
            }).filter(p => p);
        }
        
        // ========== ПРОВЕРКА ПРОКСИ ==========
        async function checkProxy(proxy) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(Math.random() > 0.3);
                }, 200);
            });
        }
        
        // ========== ПОЛУЧЕНИЕ ЛУЧШЕГО ==========
        async function getBestProxy() {
            const all = await loadAllProxies();
            if (all.length === 0) return null;
            
            const shuffled = all.sort(() => 0.5 - Math.random());
            const toCheck = shuffled.slice(0, 12);
            
            for (const proxy of toCheck) {
                const working = await checkProxy(proxy);
                if (working) return proxy;
            }
            
            return null;
        }
        
        // ========== JSONBIN ==========
        async function loadUsers() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                return data.record?.users || {};
            } catch {
                return {};
            }
        }
        
        async function saveUsers(users) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ users })
                });
            } catch (e) {}
        }
        
        // ========== TELEGRAM ==========
        async function sendToTelegram(chatId, text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' })
                });
            } catch (e) {}
        }
        
        // ========== ОСНОВНОЙ ЭКРАН ==========
        async function showMain() {
            const user = tg.initDataUnsafe?.user;
            if (!user?.id) {
                document.getElementById('app').innerHTML = '<div class="container"><div class="header"><h1>Ошибка</h1><p>Открой через Telegram</p></div></div>';
                return;
            }
            
            const users = await loadUsers();
            const userData = users[user.id] || { lastGet: 0, count: 0 };
            
            const now = Date.now();
            const fiveDays = 5 * 24 * 60 * 60 * 1000;
            const timeLeft = (userData.lastGet + fiveDays) - now;
            
            const allProxies = await loadAllProxies();
            
            let html = `
                <div class="header">
                    <h1>PROXY</h1>
                    <p>@${user.username || 'user'}</p>
                </div>
                
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">получено</div>
                        <div class="stat-number">${userData.count || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">доступно</div>
                        <div class="stat-number">${allProxies.length}</div>
                    </div>
                </div>
            `;
            
            if (timeLeft <= 0 || !userData.lastGet) {
                html += `
                    <div class="timer-card">
                        <div class="timer-label">можно взять</div>
                        <div class="timer-display">✓</div>
                        <div class="timer-note">1 раз в 5 дней</div>
                    </div>
                    <button class="btn" onclick="getProxy()">ПОЛУЧИТЬ ПРОКСИ</button>
                `;
            } else {
                const days = Math.floor(timeLeft / (24*60*60*1000));
                const hours = Math.floor((timeLeft % (24*60*60*1000)) / (60*60*1000));
                
                html += `
                    <div class="timer-card">
                        <div class="timer-label">следующий через</div>
                        <div class="timer-display">${days}д ${hours}ч</div>
                        <div class="timer-note">новый прокси через ${days} дня</div>
                    </div>
                    <button class="btn" disabled>НЕДОСТУПНО</button>
                `;
            }
            
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== ПОЛУЧИТЬ ПРОКСИ ==========
        window.getProxy = async function() {
            const user = tg.initDataUnsafe?.user;
            
            document.getElementById('app').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Проверка прокси...</p>
                </div>
            `;
            
            const proxy = await getBestProxy();
            
            if (!proxy) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <h2>Нет рабочих прокси</h2>
                        <p>Попробуйте позже</p>
                        <button class="btn" onclick="showMain()">НАЗАД</button>
                    </div>
                `;
                return;
            }
            
            // Сохраняем
            const users = await loadUsers();
            users[user.id] = {
                lastGet: Date.now(),
                count: (users[user.id]?.count || 0) + 1
            };
            await saveUsers(users);
            
            // Уведомление админу
            await sendToTelegram(
                ADMIN_ID,
                `🎁 ${user.username || 'Пользователь'} взял прокси\n${proxy.ip}:${proxy.port} • ${proxy.country}`
            );
            
            // Теги для отображения
            let tags = '';
            
            if (proxy.protocol) {
                tags += `<span class="tag protocol">${proxy.protocol.toUpperCase()}</span>`;
            }
            
            if (proxy.countryShort) {
                tags += `<span class="tag country">${proxy.countryShort}</span>`;
            } else if (proxy.country) {
                tags += `<span class="tag country">${proxy.country.slice(0, 2).toUpperCase()}</span>`;
            }
            
            if (proxy.level && proxy.level !== 'Standard') {
                tags += `<span class="tag level">${proxy.level}</span>`;
            }
            
            if (proxy.city) {
                tags += `<span class="tag city">${proxy.city}</span>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>ПРОКСИ ГОТОВ</h1>
                    <p>рабочий • проверен</p>
                </div>
                
                <div class="proxy-card">
                    <div class="proxy-ip">${proxy.ip}:${proxy.port}</div>
                    <div class="proxy-tags">
                        ${tags}
                    </div>
                </div>
                
                <button class="btn" onclick="copyProxy('${proxy.ip}:${proxy.port}')">КОПИРОВАТЬ</button>
                <button class="btn btn-secondary" onclick="showMain()">НА ГЛАВНУЮ</button>
                
                <div class="note">
                    Следующий прокси через 5 дней
                </div>
            `;
        };
        
        // ========== КОПИРОВАТЬ ==========
        window.copyProxy = function(proxy) {
            navigator.clipboard?.writeText(proxy);
            tg.showPopup({ 
                title: 'Скопировано', 
                message: 'Прокси в буфере обмена',
                buttons: [{ type: 'ok' }]
            });
        };
        
        // ========== СТАРТ ==========
        showMain();
    </script>
</body>
</html>
