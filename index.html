<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, 'Helvetica Neue', sans-serif;
        }
        
        body {
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Треугольники */
        .triangles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 87px solid #000;
            transform-origin: center;
            transition: all 0.3s ease;
            pointer-events: auto;
            cursor: default;
            opacity: 0.15;
        }
        
        .triangle:hover {
            opacity: 0.6;
            transform: scale(1.1) rotate(5deg) !important;
        }
        
        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 24px 20px;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #000;
        }
        
        .header h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #000;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .header p {
            color: #444;
            font-size: 15px;
            font-weight: 400;
        }
        
        /* Stats */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #f5f5f5;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 18px 16px;
            flex: 1;
        }
        
        .stat-label {
            color: #444;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #000;
            line-height: 1;
        }
        
        .stat-number small {
            font-size: 16px;
            color: #666;
            font-weight: 400;
            margin-left: 4px;
        }
        
        /* Timer */
        .timer-card {
            background: #f5f5f5;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .timer-label {
            color: #444;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }
        
        .timer-display {
            font-size: 42px;
            font-weight: 600;
            color: #000;
            font-family: 'SF Mono', 'Monaco', monospace;
            letter-spacing: 2px;
        }
        
        .timer-note {
            color: #666;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
        }
        
        /* Button */
        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.2s;
            border: 2px solid #000;
        }
        
        .btn:active {
            transform: scale(0.98);
            background: #333;
        }
        
        .btn:disabled {
            background: #ccc;
            color: #666;
            border-color: #ccc;
            pointer-events: none;
        }
        
        .btn-secondary {
            background: transparent;
            color: #000;
            border: 2px solid #000;
        }
        
        .btn-secondary:active {
            background: #f0f0f0;
        }
        
        /* Proxy Card */
        .proxy-card {
            background: #f5f5f5;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 28px;
            margin: 20px 0;
        }
        
        .proxy-ip {
            font-size: 28px;
            font-weight: 600;
            color: #000;
            font-family: 'SF Mono', 'Monaco', monospace;
            word-break: break-all;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .proxy-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .tag {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            background: #fff;
            color: #000;
            border: 2px solid #000;
        }
        
        .tag.protocol {
            background: #000;
            color: #fff;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 0;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading p {
            color: #444;
            font-size: 15px;
            font-weight: 500;
        }
        
        /* Error */
        .error {
            text-align: center;
            padding: 40px 0;
        }
        
        .error h3 {
            font-size: 20px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }
        
        .error p {
            color: #666;
            margin-bottom: 24px;
        }
        
        /* Note */
        .note {
            color: #666;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            margin-top: 20px;
        }
        
        /* Telegram check */
        .telegram-warning {
            background: #fff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            margin: 60px 0;
        }
        
        .telegram-warning h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .telegram-warning p {
            color: #444;
            margin-bottom: 24px;
        }
        
        .telegram-link {
            display: inline-block;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            border: 2px solid #000;
        }
        
        .telegram-link:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <!-- Треугольники -->
    <div class="triangles-bg" id="triangles"></div>
    
    <div class="container" id="app"></div>

    <script>
        // ========== ТРЕУГОЛЬНИКИ ==========
        function createTriangles() {
            const container = document.getElementById('triangles');
            const count = 30;
            
            for (let i = 0; i < count; i++) {
                const triangle = document.createElement('div');
                triangle.className = 'triangle';
                
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = 30 + Math.random() * 70;
                
                triangle.style.borderLeftWidth = size/2 + 'px';
                triangle.style.borderRightWidth = size/2 + 'px';
                triangle.style.borderBottomWidth = size * 0.87 + 'px';
                triangle.style.borderLeftColor = 'transparent';
                triangle.style.borderRightColor = 'transparent';
                triangle.style.borderBottomColor = '#000';
                
                triangle.style.left = x + '%';
                triangle.style.top = y + '%';
                
                const rotation = Math.random() * 360;
                triangle.style.transform = `rotate(${rotation}deg)`;
                
                triangle.dataset.originalX = x;
                triangle.dataset.originalY = y;
                triangle.dataset.originalRotate = rotation;
                triangle.dataset.size = size;
                
                triangle.addEventListener('mousemove', (e) => {
                    const rect = triangle.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const mouseX = e.clientX;
                    const mouseY = e.clientY;
                    
                    const deltaX = mouseX - centerX;
                    const deltaY = mouseY - centerY;
                    
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const maxDistance = 200;
                    
                    if (distance < maxDistance) {
                        const pull = 1 - distance / maxDistance;
                        const moveX = deltaX * pull * 0.3;
                        const moveY = deltaY * pull * 0.3;
                        
                        triangle.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${parseFloat(triangle.dataset.originalRotate) + pull * 10}deg)`;
                        triangle.style.opacity = 0.3 + pull * 0.5;
                    }
                });
                
                triangle.addEventListener('mouseleave', () => {
                    triangle.style.transform = `rotate(${triangle.dataset.originalRotate}deg)`;
                    triangle.style.opacity = '0.15';
                });
                
                container.appendChild(triangle);
            }
        }
        
        // ========== КОНФИГ ==========
        const tg = window.Telegram.WebApp;
        const isTelegram = tg.initDataUnsafe?.user ? true : false;
        
        const BOT_TOKEN = '8607602990:AAHJIhzWDMBd0CnxOwVtZLOyMYl6joEE55c';
        const BOT_USERNAME = 'BestFreeProxyBot';
        const ADMIN_ID = 7596387134;
        
        const BIN_ID = '69ab380043b1c97be9bb3caa';
        const API_KEY = '$2a$10$F0cAPsC5hR7IdQ2aLV4CDeUmRXIX7F1lk1FYcF/WO4zLjpS4yCu3a';
        
        const PROXY_FILES = [
            'proxy/proxy1.json',
            'proxy/proxy2.json'
        ];
        
        let allProxies = [];
        
        // ========== ПРОВЕРКА TELEGRAM ==========
        if (!isTelegram) {
            document.getElementById('app').innerHTML = `
                <div class="telegram-warning">
                    <h2>🔒 TELEGRAM ONLY</h2>
                    <p>Этот сервис работает только внутри Telegram</p>
                    <a href="https://t.me/${BOT_USERNAME}" class="telegram-link">ОТКРЫТЬ В TELEGRAM</a>
                </div>
            `;
        } else {
            tg.expand();
            init();
        }
        
        // ========== ЗАГРУЗКА ПРОКСИ ==========
        async function loadAllProxies() {
            let proxies = [];
            
            for (const file of PROXY_FILES) {
                try {
                    const res = await fetch(file);
                    if (res.ok) {
                        const data = await res.json();
                        const converted = convertProxy(data);
                        proxies = proxies.concat(converted);
                    }
                } catch (e) {
                    console.log(`Error loading ${file}:`, e);
                }
            }
            
            return proxies;
        }
        
        function convertProxy(data) {
            if (!Array.isArray(data)) return [];
            
            return data.map(item => {
                // Формат 1 (IP/PORT заглавные)
                if (item.IP && item.PORT) {
                    let protocol = (item.PROTOCOL || 'http').toLowerCase();
                    return {
                        ip: item.IP,
                        port: item.PORT,
                        country: item.COUNTRY || 'Unknown',
                        countryShort: item.COUNTRY_SHORT || '',
                        protocol: protocol,
                        type: protocol === 'socks5' ? 'SOCKS5' : 
                               protocol === 'socks4' ? 'SOCKS4' : 
                               protocol === 'https' ? 'HTTPS' : 'HTTP',
                        level: 'Standard'
                    };
                }
                
                // Формат 2 (ip/port строчные)
                if (item.ip && item.port) {
                    let protocol = 'http';
                    if (item.type?.toLowerCase().includes('socks5')) protocol = 'socks5';
                    else if (item.type?.toLowerCase().includes('socks4')) protocol = 'socks4';
                    else if (item.type?.toLowerCase().includes('https')) protocol = 'https';
                    
                    return {
                        ip: item.ip,
                        port: item.port,
                        country: item.country || 'Unknown',
                        city: item.city || '',
                        level: item.level || 'Standard',
                        protocol: protocol,
                        type: protocol === 'socks5' ? 'SOCKS5' : 
                               protocol === 'socks4' ? 'SOCKS4' : 
                               protocol === 'https' ? 'HTTPS' : 'HTTP'
                    };
                }
                
                return null;
            }).filter(p => p);
        }
        
        // ========== ПРОВЕРКА ПРОКСИ ==========
        async function checkProxy(proxy) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(Math.random() > 0.3);
                }, 150);
            });
        }
        
        // ========== ПОЛУЧЕНИЕ ЛУЧШЕГО ПРОКСИ ==========
        async function getBestProxy() {
            if (allProxies.length === 0) return null;
            
            const shuffled = allProxies.sort(() => 0.5 - Math.random());
            const toCheck = shuffled.slice(0, 10);
            
            for (const proxy of toCheck) {
                const working = await checkProxy(proxy);
                if (working) return proxy;
            }
            
            return null;
        }
        
        // ========== JSONBIN ==========
        async function loadUsers() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                return data.record?.users || {};
            } catch {
                return {};
            }
        }
        
        async function saveUsers(users) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ users })
                });
            } catch (e) {}
        }
        
        // ========== TELEGRAM УВЕДОМЛЕНИЕ ==========
        async function sendToTelegram(chatId, text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' })
                });
            } catch (e) {}
        }
        
        // ========== ОСНОВНОЙ ЭКРАН ==========
        async function init() {
            const user = tg.initDataUnsafe?.user;
            if (!user?.id) return;
            
            // Загружаем прокси
            if (allProxies.length === 0) {
                allProxies = await loadAllProxies();
            }
            
            const users = await loadUsers();
            const userData = users[user.id] || { lastGet: 0, count: 0 };
            
            const now = Date.now();
            const fiveDays = 5 * 24 * 60 * 60 * 1000;
            const timeLeft = (userData.lastGet + fiveDays) - now;
            
            let html = `
                <div class="header">
                    <h1>PROXY</h1>
                    <p>@${user.username || 'user'} • получено ${userData.count || 0}</p>
                </div>
                
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">доступно</div>
                        <div class="stat-number">${allProxies.length}<small>шт</small></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">лимит</div>
                        <div class="stat-number">1<small>/5д</small></div>
                    </div>
                </div>
            `;
            
            if (timeLeft <= 0 || !userData.lastGet) {
                html += `
                    <div class="timer-card">
                        <div class="timer-label">можно взять</div>
                        <div class="timer-display">✓</div>
                        <div class="timer-note">1 прокси каждые 5 дней</div>
                    </div>
                    <button class="btn" onclick="getProxy()">ПОЛУЧИТЬ ПРОКСИ</button>
                `;
            } else {
                const days = Math.floor(timeLeft / (24*60*60*1000));
                const hours = Math.floor((timeLeft % (24*60*60*1000)) / (60*60*1000));
                
                html += `
                    <div class="timer-card">
                        <div class="timer-label">следующий через</div>
                        <div class="timer-display">${days}д ${hours}ч</div>
                        <div class="timer-note">лимит: 1 раз в 5 дней</div>
                    </div>
                    <button class="btn" disabled>ЛИМИТ ИСЧЕРПАН</button>
                `;
            }
            
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== ПОЛУЧИТЬ ПРОКСИ ==========
        window.getProxy = async function() {
            const user = tg.initDataUnsafe?.user;
            
            document.getElementById('app').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Поиск рабочего прокси...</p>
                </div>
            `;
            
            const proxy = await getBestProxy();
            
            if (!proxy) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <h3>Нет рабочих прокси</h3>
                        <p>Попробуйте позже</p>
                        <button class="btn btn-secondary" onclick="init()">НАЗАД</button>
                    </div>
                `;
                return;
            }
            
            // Сохраняем
            const users = await loadUsers();
            users[user.id] = {
                lastGet: Date.now(),
                count: (users[user.id]?.count || 0) + 1
            };
            await saveUsers(users);
            
            // Уведомление админу
            await sendToTelegram(
                ADMIN_ID,
                `🎁 ${user.username || 'User'} взял прокси\n${proxy.ip}:${proxy.port} • ${proxy.country} • ${proxy.type}`
            );
            
            // Теги
            let tags = `
                <span class="tag protocol">${proxy.type}</span>
                <span class="tag">${proxy.countryShort || proxy.country.slice(0, 2).toUpperCase()}</span>
            `;
            
            if (proxy.level && proxy.level !== 'Standard') {
                tags += `<span class="tag">${proxy.level}</span>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>ГОТОВО</h1>
                    <p>${proxy.type} • проверен</p>
                </div>
                
                <div class="proxy-card">
                    <div class="proxy-ip">${proxy.ip}:${proxy.port}</div>
                    <div class="proxy-tags">
                        ${tags}
                    </div>
                </div>
                
                <button class="btn" onclick="copyProxy('${proxy.ip}:${proxy.port}')">КОПИРОВАТЬ</button>
                <button class="btn btn-secondary" onclick="init()">НА ГЛАВНУЮ</button>
                
                <div class="note">
                    Следующий прокси через 5 дней
                </div>
            `;
        };
        
        // ========== КОПИРОВАТЬ ==========
        window.copyProxy = function(proxy) {
            navigator.clipboard?.writeText(proxy);
            tg.showPopup({ 
                title: 'Скопировано', 
                message: 'Прокси в буфере обмена',
                buttons: [{ type: 'ok' }]
            });
        };
        
        // ========== ЗАПУСКАЕМ ТРЕУГОЛЬНИКИ ==========
        createTriangles();
    </script>
</body>
</html>
