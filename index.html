<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friend Test Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        .check-block {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
            margin-top: 10px;
        }
        
        .check-block h2 {
            margin-bottom: 24px;
            color: var(--tg-theme-text-color, #000);
            font-size: clamp(18px, 5vw, 22px);
        }
        
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 14px;
            border: 2px solid var(--tg-theme-button-color, #40a7e3);
        }
        
        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        
        .channel-emoji {
            font-size: 24px;
        }
        
        .channel-name {
            font-weight: 600;
            color: var(--tg-theme-text-color, #000);
            font-size: 15px;
        }
        
        .subscribe-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .check-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        
        .constructor-block {
            display: none;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color, #666);
            font-weight: 500;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 12px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        
        .question-block {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        .option-item input[type="text"] {
            flex: 1;
            padding: 8px;
        }
        
        .option-item input[type="radio"] {
            width: 20px;
            height: 20px;
        }
        
        .add-question {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin: 20px 0;
        }
        
        .create-test {
            background: #667eea;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        
        .result-link {
            margin-top: 24px;
            padding: 20px;
            background: #e8f5e8;
            border-radius: 16px;
            display: none;
        }
        
        .result-link input {
            width: 100%;
            padding: 14px;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        
        .success-message, .error-message, .warning-message {
            padding: 14px;
            border-radius: 12px;
            margin: 15px 0;
            font-weight: 500;
        }
        
        .success-message {
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        
        .error-message {
            color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }
        
        .warning-message {
            color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }
        
        .user-info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .test-page {
            padding: 16px 0;
        }
        
        .test-header {
            text-align: center;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
        }
        
        .test-question {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .test-option {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--tg-theme-bg-color);
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .test-option.selected {
            border-color: #40a7e3;
            background: rgba(64, 167, 227, 0.05);
        }
        
        .test-option input[type="radio"] {
            margin-right: 12px;
            width: 20px;
            height: 20px;
        }
        
        .test-submit {
            background: var(--tg-theme-button-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
        }
        
        .test-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .test-result {
            text-align: center;
            padding: 24px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            margin-top: 20px;
        }
        
        .percentage {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        
        .quote {
            font-size: 22px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
        }
        
        .back-btn {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
        
        h2 {
            margin: 24px 0 16px;
            font-size: 20px;
        }
        
        small {
            color: #666;
            display: block;
            margin-top: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Информация о пользователе -->
        <div id="userInfo" class="user-info">Загрузка...</div>
        
        <!-- Блок проверки подписки -->
        <div id="checkBlock" class="check-block">
            <h2>📝 Для создания теста подпишись на каналы:</h2>
            
            <div class="channel-list">
                <div class="channel-item">
                    <div class="channel-info">
                        <span class="channel-emoji">📢</span>
                        <span class="channel-name">@literoom_clorum</span>
                    </div>
                    <a href="https://t.me/literoom_clorum" target="_blank" class="subscribe-btn">Перейти</a>
                </div>
                
                <div class="channel-item">
                    <div class="channel-info">
                        <span class="channel-emoji">⭐</span>
                        <span class="channel-name">@bravostarstyr</span>
                    </div>
                    <a href="https://t.me/bravostarstyr" target="_blank" class="subscribe-btn">Перейти</a>
                </div>
            </div>
            
            <div id="messageArea"></div>
            
            <button id="checkSubsBtn" class="check-btn" onclick="checkSubscriptions()">🔍 Проверить подписку</button>
        </div>
        
        <!-- Блок конструктора тестов -->
        <div id="constructorBlock" class="constructor-block">
            <h1>📝 Создай тест на друга</h1>
            
            <form id="testForm">
                <div class="form-group">
                    <label>Название теста</label>
                    <input type="text" id="testTitle" placeholder="Например: Насколько хорошо ты меня знаешь?" required>
                </div>
                
                <div class="form-group">
                    <label>Твое имя</label>
                    <input type="text" id="authorName" placeholder="Твое имя" required>
                </div>
                
                <h2>Вопросы</h2>
                <div id="questionsContainer"></div>
                
                <button type="button" class="add-question" onclick="addQuestion()">➕ Добавить вопрос</button>
                
                <h2>Цитаты для результатов</h2>
                
                <div class="form-group">
                    <label>100% (Лучшие друзья)</label>
                    <textarea id="quote100" rows="2">🎉 Вы лучшие и не разлучимые друзья на веки!</textarea>
                </div>
                
                <div class="form-group">
                    <label>75-99%</label>
                    <textarea id="quote75" rows="2">👍 Вы отличные друзья!</textarea>
                </div>
                
                <div class="form-group">
                    <label>50-74%</label>
                    <textarea id="quote50" rows="2">👌 Хорошие друзья, можно и лучше</textarea>
                </div>
                
                <div class="form-group">
                    <label>25-49%</label>
                    <textarea id="quote25" rows="2">🤔 Стоит узнать друг друга получше</textarea>
                </div>
                
                <div class="form-group">
                    <label>0-24%</label>
                    <textarea id="quote0" rows="2">😅 Похоже, вы не очень близки</textarea>
                </div>
                
                <button type="submit" class="create-test">🔗 Создать тест</button>
            </form>
            
            <div class="result-link" id="resultLink">
                <strong>✅ Тест создан!</strong>
                <p>Отправь ссылку друзьям (откроется прямо в Telegram):</p>
                <input type="text" id="testUrl" readonly>
                <button class="copy-btn" onclick="copyUrl()">📋 Скопировать ссылку</button>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id;
        const username = user?.username || user?.first_name || 'Пользователь';
        
        // Токен бота
        const BOT_TOKEN = '8682719938:AAEFdbbXez_0f7M87QvzcTf5gm7Mybl6Eho';
        
        // JSONBin.io credentials - ТВОИ ДАННЫЕ
        const JSONBIN_API_KEY = '$2a$10$F0cAPsC5hR7IdQ2aLV4CDeUmRXIX7F1lk1FYcF/WO4zLjpS4yCu3a';
        const JSONBIN_BIN_ID = '69ab380043b1c97be9bb3caa';
        
        // Telegram bot username - ВСТАВЬ ИМЯ СВОЕГО БОТА (без @)
        const BOT_USERNAME = 'FriendTest54Bot'; // ЗАМЕНИ НА СВОЕ!
        
        // Каналы для проверки
        const CHANNELS = [
            { name: 'literoom_clorum', display: '@literoom_clorum' },
            { name: 'bravostarstyr', display: '@bravostarstyr' }
        ];
        
        let questionCount = 0;
        let currentTestId = null;
        
        // Показываем информацию о пользователе
        document.getElementById('userInfo').innerHTML = `👤 ${username} (ID: ${userId || 'не определен'})`;
        
        // Функция сокращения ссылок
        async function shortenUrl(longUrl) {
            try {
                // Используем бесплатный сервис v.gd
                const response = await fetch(`https://v.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
                if (response.ok) {
                    const shortUrl = await response.text();
                    return shortUrl.trim();
                }
            } catch (e) {
                console.log('Ошибка сокращения ссылки:', e);
            }
            return longUrl; // если не получилось - вернем оригинал
        }
        
        // Проверка подписки
        async function checkSubscriptions() {
            const messageArea = document.getElementById('messageArea');
            const checkBtn = document.getElementById('checkSubsBtn');
            
            if (!userId) {
                showMessage('❌ Ошибка: открой бота через Telegram!', 'error');
                return;
            }
            
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<span class="loading"></span> Проверка...';
            
            try {
                let allSubscribed = true;
                let notSubscribed = [];
                
                for (const channel of CHANNELS) {
                    const isSubscribed = await checkChannel(channel.name);
                    if (!isSubscribed) {
                        allSubscribed = false;
                        notSubscribed.push(channel.display);
                    }
                }
                
                if (allSubscribed) {
                    showMessage('✅ Подписка подтверждена!', 'success');
                    setTimeout(() => {
                        document.getElementById('checkBlock').style.display = 'none';
                        document.getElementById('constructorBlock').style.display = 'block';
                        if (questionCount === 0) addQuestion();
                        tg.HapticFeedback.notification('success');
                    }, 1500);
                } else {
                    showMessage(`❌ Не подписан на: ${notSubscribed.join(', ')}`, 'error');
                    tg.HapticFeedback.notification('error');
                }
            } catch (error) {
                showMessage('❌ Ошибка при проверке', 'error');
            } finally {
                checkBtn.disabled = false;
                checkBtn.innerHTML = '🔍 Проверить подписку';
            }
        }
        
        async function checkChannel(channelName) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: `@${channelName}`, user_id: userId })
                });
                const data = await response.json();
                if (data.ok) {
                    return ['creator', 'administrator', 'member'].includes(data.result.status);
                }
                return false;
            } catch {
                return false;
            }
        }
        
        function showMessage(text, type) {
            document.getElementById('messageArea').innerHTML = `<div class="${type}-message">${text}</div>`;
        }
        
        function addQuestion() {
            questionCount++;
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.className = 'question-block';
            div.id = `q_${questionCount}`;
            
            let html = `<div style="display: flex; justify-content: space-between;">
                <h3>Вопрос ${questionCount}</h3>`;
            if (questionCount > 1) {
                html += `<button type="button" class="delete-question" onclick="deleteQuestion(${questionCount})">❌</button>`;
            }
            html += `</div>
                <div class="form-group">
                    <input type="text" id="q${questionCount}_text" placeholder="Текст вопроса" required>
                </div>
                <div class="options-grid">`;
            
            for (let i = 1; i <= 4; i++) {
                html += `
                    <div class="option-item">
                        <input type="text" id="q${questionCount}_opt${i}" placeholder="Вариант ${String.fromCharCode(64 + i)}" required>
                        <input type="radio" name="q${questionCount}_correct" value="${i-1}" ${i===1?'checked':''}>
                    </div>`;
            }
            
            html += `</div><small>✓ Выберите правильный ответ</small>`;
            div.innerHTML = html;
            container.appendChild(div);
        }
        
        function deleteQuestion(id) {
            document.getElementById(`q_${id}`)?.remove();
            updateQuestionNumbers();
        }
        
        function updateQuestionNumbers() {
            const questions = document.querySelectorAll('.question-block');
            questionCount = questions.length;
            questions.forEach((q, i) => {
                q.id = `q_${i+1}`;
                q.querySelector('h3').textContent = `Вопрос ${i+1}`;
            });
        }
        
        // СОХРАНЕНИЕ ТЕСТА В JSONBIN.IO
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (questionCount === 0) {
                alert('Добавьте вопрос!');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = '<span class="loading"></span> Сохранение...';
            submitBtn.disabled = true;
            
            try {
                // Собираем данные теста
                const testData = {
                    title: document.getElementById('testTitle').value,
                    author: document.getElementById('authorName').value,
                    creator: { id: userId, name: username },
                    quotes: {
                        '100': document.getElementById('quote100').value,
                        '75': document.getElementById('quote75').value,
                        '50': document.getElementById('quote50').value,
                        '25': document.getElementById('quote25').value,
                        '0': document.getElementById('quote0').value
                    },
                    questions: [],
                    created: Date.now(),
                    plays: 0
                };
                
                // Собираем вопросы
                for (let i = 1; i <= questionCount; i++) {
                    const qText = document.getElementById(`q${i}_text`)?.value;
                    if (!qText) { alert(`Вопрос ${i}`); return; }
                    
                    const options = [];
                    for (let j = 1; j <= 4; j++) {
                        const opt = document.getElementById(`q${i}_opt${j}`)?.value;
                        if (!opt) { alert(`Вариант ${j} в вопросе ${i}`); return; }
                        options.push(opt);
                    }
                    
                    const correct = document.querySelector(`input[name="q${i}_correct"]:checked`)?.value || 0;
                    
                    testData.questions.push({
                        text: qText,
                        options: options,
                        correct: parseInt(correct)
                    });
                }
                
                // Генерируем ID теста
                const testId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                
                // СОХРАНЯЕМ В JSONBIN.IO
                const getResponse = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                
                let allTests = {};
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    allTests = data.record || {};
                }
                
                allTests[testId] = testData;
                
                const saveResponse = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(allTests)
                });
                
                if (!saveResponse.ok) {
                    throw new Error('Ошибка сохранения');
                }
                
                // СОЗДАЕМ КОРОТКУЮ ССЫЛКУ ДЛЯ TELEGRAM
               const testUrl = `https://t.me/${BOT_USERNAME}/app?startapp=${testId}`;
                
                document.getElementById('testUrl').value = testUrl;
                document.getElementById('resultLink').style.display = 'block';
                showMessage('✅ Тест сохранен! Ссылка откроется прямо в Telegram', 'success');
                tg.HapticFeedback.notification('success');
                
            } catch (error) {
                console.error(error);
                showMessage('❌ Ошибка: ' + error.message, 'error');
                tg.HapticFeedback.notification('error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        function copyUrl() {
            const urlInput = document.getElementById('testUrl');
            urlInput.select();
            document.execCommand('copy');
            
            tg.showPopup({ 
                title: '✅ Скопировано!', 
                message: 'Ссылка скопирована. Отправь её друзьям - она откроется прямо в Telegram!',
                buttons: [{ type: 'ok' }]
            });
        }
        
        // Загрузка теста при открытии ссылки
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            let testId = params.get('test');
            
            // Проверяем startapp параметр (из Telegram Mini App)
            const startapp = params.get('tgWebAppStartParam') || params.get('startapp');
            if (startapp && startapp.startsWith('test_')) {
                testId = startapp;
            }
            
            if (testId) {
                loadTest(testId);
            } else {
                document.getElementById('checkBlock').style.display = 'block';
            }
        };
        
        // ЗАГРУЗКА ТЕСТА ИЗ JSONBIN.IO
        async function loadTest(testId) {
            try {
                showMessage('⏳ Загрузка теста...', 'warning');
                
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки');
                
                const data = await response.json();
                const allTests = data.record || {};
                const testData = allTests[testId];
                
                if (!testData) {
                    showTestNotFound();
                    return;
                }
                
                currentTestId = testId;
                showTestPage(testData);
                
            } catch (error) {
                console.error(error);
                showTestNotFound();
            }
        }
        
        function showTestNotFound() {
            document.body.innerHTML = `
                <div class="container">
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 64px;">😢</div>
                        <h2>Тест не найден</h2>
                        <p>Ссылка недействительна или тест удален</p>
                        <button onclick="location.href=location.pathname" 
                                style="background: var(--tg-theme-button-color); color: white; 
                                       border: none; padding: 16px; border-radius: 14px; 
                                       font-size: 16px; width: 100%; cursor: pointer;">
                            🔙 На главную
                        </button>
                    </div>
                </div>
            `;
        }
        
        function showTestPage(testData) {
            const app = document.querySelector('.container');
            let userAnswers = new Array(testData.questions.length).fill(null);
            
            let html = `
                <div class="test-page">
                    <div class="test-header">
                        <h1>${testData.title}</h1>
                        <div class="author">Тест от ${testData.author}</div>
                    </div>
            `;
            
            testData.questions.forEach((q, i) => {
                html += `
                    <div class="test-question" id="q_${i}">
                        <h3>${i+1}. ${q.text}</h3>
                `;
                q.options.forEach((opt, j) => {
                    html += `
                        <div class="test-option" onclick="selectAnswer(${i}, ${j})">
                            <input type="radio" name="q${i}" value="${j}" id="q${i}opt${j}">
                            <label for="q${i}opt${j}">${opt}</label>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            
            html += `
                    <button class="test-submit" onclick="calculateResult()" id="submitBtn" disabled>🔍 Узнать результат</button>
                    <div id="testResult" class="test-result" style="display: none;"></div>
                    <button class="back-btn" onclick="location.href=location.pathname">← Назад</button>
                </div>
            `;
            
            app.innerHTML = html;
            
            window.testData = testData;
            window.userAnswers = userAnswers;
            window.currentTestId = currentTestId;
        }
        
        window.selectAnswer = function(qIdx, optIdx) {
            document.getElementById(`q${qIdx}opt${optIdx}`).checked = true;
            document.querySelectorAll(`#q_${qIdx} .test-option`).forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            window.userAnswers[qIdx] = optIdx;
            
            const allAnswered = window.userAnswers.every(a => a !== null);
            document.getElementById('submitBtn').disabled = !allAnswered;
        };
        
        window.calculateResult = function() {
            let correct = 0;
            window.testData.questions.forEach((q, i) => {
                if (window.userAnswers[i] === q.correct) correct++;
            });
            
            const percentage = Math.round((correct / window.testData.questions.length) * 100);
            
            let quote;
            if (percentage === 100) quote = window.testData.quotes['100'];
            else if (percentage >= 75) quote = window.testData.quotes['75'];
            else if (percentage >= 50) quote = window.testData.quotes['50'];
            else if (percentage >= 25) quote = window.testData.quotes['25'];
            else quote = window.testData.quotes['0'];
            
            // Обновляем статистику в JSONBin
            updateTestStats(window.currentTestId, percentage);
            
            const resultDiv = document.getElementById('testResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h2>Результат</h2>
                <div class="percentage">${percentage}%</div>
                <div class="quote">${quote}</div>
                <div style="margin: 10px 0;">✅ Правильных: ${correct} из ${window.testData.questions.length}</div>
            `;
            
            tg.HapticFeedback.notification('success');
        };
        
        async function updateTestStats(testId, percentage) {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                
                if (!response.ok) return;
                
                const data = await response.json();
                const allTests = data.record || {};
                const test = allTests[testId];
                
                if (test) {
                    test.plays = (test.plays || 0) + 1;
                    
                    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_API_KEY
                        },
                        body: JSON.stringify(allTests)
                    });
                }
            } catch (error) {
                console.error('Ошибка обновления статистики:', error);
            }
        }
    </script>
</body>
</html>
