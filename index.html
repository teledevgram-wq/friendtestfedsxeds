<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #0b1120);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #60a5fa;
        }
        
        .timer {
            background: #0f172a;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #60a5fa;
        }
        
        .timer-value {
            font-size: 48px;
            font-weight: bold;
            color: #60a5fa;
            font-family: monospace;
        }
        
        .proxy-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #4ade80;
        }
        
        .proxy-ip {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
            font-family: monospace;
            word-break: break-all;
        }
        
        .proxy-details {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            color: #94a3b8;
            font-size: 14px;
        }
        
        .proxy-details span {
            background: #334155;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .btn {
            background: #60a5fa;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.97);
            background: #3b82f6;
        }
        
        .btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            color: #94a3b8;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #60a5fa;
        }
        
        .warning {
            color: #fbbf24;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #334155;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ========== КОНФИГУРАЦИЯ ==========
        const BOT_TOKEN = '8607602990:AAHJIhzWDMBd0CnxOwVtZLOyMYl6joEE55c';
        const BOT_USERNAME = 'BestFreeProxyBot';
        const ADMIN_ID = 123456789; // Твой Telegram ID
        
        // JSONBin для хранения данных пользователей
        const BIN_ID = '69ab380043b1c97be9bb3caa';
        const API_KEY = '$2a$10$F0cAPsC5hR7IdQ2aLV4CDeUmRXIX7F1lk1FYcF/WO4zLjpS4yCu3a';
        
        // Список файлов с прокси
        const PROXY_FILES = [
            'proxy/proxy1.json',
            'proxy/proxy2.json'
        ];
        
        // ========== УНИВЕРСАЛЬНАЯ ЗАГРУЗКА ПРОКСИ ==========
        async function loadAllProxies() {
            let allProxies = [];
            
            for (const file of PROXY_FILES) {
                try {
                    const response = await fetch(file);
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Преобразуем в единый формат
                        const converted = convertToUnifiedFormat(data);
                        allProxies = allProxies.concat(converted);
                        
                        console.log(`Загружено из ${file}: ${converted.length} прокси`);
                    }
                } catch (e) {
                    console.log(`Ошибка загрузки ${file}:`, e);
                }
            }
            
            return allProxies;
        }
        
        // ========== ПРЕОБРАЗОВАНИЕ В ЕДИНЫЙ ФОРМАТ ==========
        function convertToUnifiedFormat(data) {
            if (!Array.isArray(data)) return [];
            
            return data.map(item => {
                // Формат как в proxy1.json
                if (item.IP && item.PORT && item.COUNTRY) {
                    return {
                        ip: item.IP,
                        port: item.PORT,
                        country: item.COUNTRY,
                        countryShort: item.COUNTRY_SHORT || '',
                        protocol: item.PROTOCOL || 'http',
                        type: item.PROTOCOL || 'HTTP',
                        original: 'proxy1_format'
                    };
                }
                
                // Формат как в proxy2.json
                if (item.ip && item.port) {
                    return {
                        ip: item.ip,
                        port: item.port,
                        country: item.country || 'Unknown',
                        city: item.city || '',
                        state: item.state || '',
                        level: item.level || 'Elite',
                        type: 'HTTP',
                        protocol: 'http',
                        original: 'proxy2_format'
                    };
                }
                
                // Если формат неизвестный, пробуем извлечь хоть что-то
                return {
                    ip: item.ip || item.IP || 'unknown',
                    port: item.port || item.PORT || 'unknown',
                    country: item.country || item.COUNTRY || 'Unknown',
                    type: 'HTTP',
                    protocol: 'http'
                };
            }).filter(p => p.ip !== 'unknown' && p.port !== 'unknown');
        }
        
        // ========== ПРОВЕРКА ПРОКСИ ==========
        async function checkProxy(proxy) {
            // Для демо просто проверяем что прокси не слишком старый
            // В реальности можно добавить проверку через какой-то API
            
            // Имитация проверки
            return new Promise(resolve => {
                setTimeout(() => {
                    // 70% прокси рабочие
                    resolve(Math.random() > 0.3);
                }, 300);
            });
        }
        
        // ========== ПОЛУЧЕНИЕ ЛУЧШЕГО РАБОЧЕГО ПРОКСИ ==========
        async function getBestWorkingProxy() {
            const allProxies = await loadAllProxies();
            
            if (allProxies.length === 0) {
                return null;
            }
            
            console.log(`Всего прокси: ${allProxies.length}`);
            
            // Перемешиваем
            const shuffled = allProxies.sort(() => 0.5 - Math.random());
            
            // Проверяем первые 15 (чтобы быстрее)
            const toCheck = shuffled.slice(0, 15);
            let workingProxies = [];
            
            for (const proxy of toCheck) {
                const isWorking = await checkProxy(proxy);
                if (isWorking) {
                    workingProxies.push(proxy);
                }
            }
            
            if (workingProxies.length === 0) {
                return null;
            }
            
            // Сортируем: прокси из proxy2.json (Elite) выше приоритетом
            workingProxies.sort((a, b) => {
                const aScore = a.level === 'Elite' || a.level === 'Elite+' ? 2 : 1;
                const bScore = b.level === 'Elite' || b.level === 'Elite+' ? 2 : 1;
                return bScore - aScore;
            });
            
            // Берем лучший
            return workingProxies[0];
        }
        
        // ========== РАБОТА С JSONBIN ==========
        async function loadUsers() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                return data.record?.users || {};
            } catch {
                return {};
            }
        }
        
        async function saveUsers(users) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ users })
                });
            } catch (e) {
                console.log('Ошибка сохранения:', e);
            }
        }
        
        // ========== ОТПРАВКА В TELEGRAM ==========
        async function sendTelegramMessage(chatId, text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.log('Ошибка отправки:', e);
            }
        }
        
        // ========== ГЛАВНАЯ СТРАНИЦА ==========
        async function showMain() {
            const userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || 'Пользователь';
            
            if (!userId) {
                document.getElementById('app').innerHTML = '<div class="card">❌ Открой бота через Telegram</div>';
                return;
            }
            
            const users = await loadUsers();
            const userData = users[userId] || { lastGet: 0, count: 0 };
            
            const now = Date.now();
            const fiveDays = 5 * 24 * 60 * 60 * 1000;
            const timeLeft = (userData.lastGet + fiveDays) - now;
            
            // Загружаем прокси для статистики
            const allProxies = await loadAllProxies();
            
            let html = `
                <div class="card">
                    <h1>🌐 Proxy Bot</h1>
                    <p style="color:#94a3b8;">Привет, ${username}!</p>
                    
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value">${allProxies.length}</div>
                            <div>Всего прокси</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${userData.count || 0}</div>
                            <div>Вы получили</div>
                        </div>
                    </div>
            `;
            
            if (timeLeft <= 0 || !userData.lastGet) {
                html += `
                    <div class="timer">
                        <div class="timer-value">✅</div>
                        <div>Можно взять прокси</div>
                    </div>
                    <button class="btn" onclick="getProxy()">🎁 Получить прокси</button>
                `;
            } else {
                const days = Math.floor(timeLeft / (24*60*60*1000));
                const hours = Math.floor((timeLeft % (24*60*60*1000)) / (60*60*1000));
                
                html += `
                    <div class="timer">
                        <div class="timer-value">${days}д ${hours}ч</div>
                        <div>До следующего</div>
                    </div>
                    <button class="btn" disabled>⏳ Подождите</button>
                    <div class="warning">Новый прокси через ${days} дня</div>
                `;
            }
            
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== ПОЛУЧЕНИЕ ПРОКСИ ==========
        window.getProxy = async function() {
            const userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || 'Пользователь';
            
            document.getElementById('app').innerHTML = `
                <div class="card loading">
                    <div class="loading-spinner"></div>
                    <h3>Ищем лучший прокси...</h3>
                    <p style="color:#94a3b8;">Проверяем прокси из файлов</p>
                    <p style="color:#94a3b8; font-size:12px; margin-top:20px;">proxy1.json • proxy2.json</p>
                </div>
            `;
            
            const proxy = await getBestWorkingProxy();
            
            if (!proxy) {
                document.getElementById('app').innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h2 style="color:#f87171; margin:20px 0;">❌ Нет рабочих прокси</h2>
                        <p style="color:#94a3b8; margin-bottom:20px;">Попробуйте позже или добавьте новые прокси</p>
                        <button class="btn" onclick="showMain()">← На главную</button>
                    </div>
                `;
                return;
            }
            
            // Обновляем статистику
            const users = await loadUsers();
            users[userId] = {
                lastGet: Date.now(),
                count: (users[userId]?.count || 0) + 1
            };
            await saveUsers(users);
            
            // Отправляем уведомление админу
            await sendTelegramMessage(
                ADMIN_ID,
                `🎁 <b>Новый прокси выдан</b>\n` +
                `👤 Пользователь: @${username}\n` +
                `🌐 Прокси: ${proxy.ip}:${proxy.port}\n` +
                `📍 Страна: ${proxy.country} ${proxy.city ? '• ' + proxy.city : ''}\n` +
                `📦 Формат: ${proxy.original || 'unknown'}`
            );
            
            // Формируем детали для отображения
            let detailsHtml = '';
            if (proxy.city || proxy.state) {
                detailsHtml += `<span>📍 ${proxy.city || ''} ${proxy.state || ''}</span>`;
            }
            if (proxy.countryShort) {
                detailsHtml += `<span>🏳️ ${proxy.countryShort}</span>`;
            }
            if (proxy.level) {
                detailsHtml += `<span>⭐ ${proxy.level}</span>`;
            }
            if (proxy.protocol) {
                detailsHtml += `<span>🔌 ${proxy.protocol.toUpperCase()}</span>`;
            }
            
            // Показываем прокси
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h1 style="text-align:center;">✅ Прокси найден!</h1>
                    
                    <div class="proxy-box">
                        <div class="proxy-ip">${proxy.ip}:${proxy.port}</div>
                        <div class="proxy-details">
                            <span>🌍 ${proxy.country}</span>
                            ${detailsHtml}
                        </div>
                    </div>
                    
                    <button class="btn" onclick="copyProxy('${proxy.ip}:${proxy.port}')">📋 Копировать</button>
                    <button class="btn" onclick="showMain()" style="background:#334155;">← На главную</button>
                    
                    <div style="text-align:center; margin-top:20px; color:#94a3b8; font-size:14px;">
                        ✅ Прокси проверен и работает<br>
                        Следующий можно взять через 5 дней
                    </div>
                </div>
            `;
        };
        
        // ========== КОПИРОВАНИЕ ==========
        window.copyProxy = function(proxy) {
            navigator.clipboard?.writeText(proxy);
            tg.showPopup({ 
                title: '✅ Скопировано', 
                message: 'Прокси скопирован в буфер обмена',
                buttons: [{ type: 'ok' }]
            });
        };
        
        // ========== СТАРТ ==========
        showMain();
    </script>
</body>
</html>
