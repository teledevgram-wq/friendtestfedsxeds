<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #0b1120);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #60a5fa;
        }
        
        .timer {
            background: #0f172a;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #60a5fa;
        }
        
        .timer-value {
            font-size: 48px;
            font-weight: bold;
            color: #60a5fa;
            font-family: monospace;
        }
        
        .proxy-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #4ade80;
        }
        
        .proxy-ip {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
            font-family: monospace;
            word-break: break-all;
        }
        
        .btn {
            background: #60a5fa;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.97);
            background: #3b82f6;
        }
        
        .btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            color: #94a3b8;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #60a5fa;
        }
        
        .warning {
            color: #fbbf24;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ========== КОНФИГУРАЦИЯ ==========
        const BOT_TOKEN = '8682719938:AAEFdbbXez_0f7M87QvzcTf5gm7Mybl6Eho';
        const BOT_USERNAME = 'FriendTest54Bot';
        const ADMIN_ID = 123456789; // Твой Telegram ID
        
        // JSONBin для хранения данных пользователей
        const BIN_ID = '69ab380043b1c97be9bb3caa';
        const API_KEY = '$2a$10$F0cAPsC5hR7IdQ2aLV4CDeUmRXIX7F1lk1FYcF/WO4zLjpS4yCu3a';
        
        // ========== ПРОКСИ ИЗ ФАЙЛОВ ==========
        async function loadProxiesFromFiles() {
            // Список файлов с прокси
            const proxyFiles = [
                'proxy/proxy1.json',
                'proxy/proxy2.json',
                'proxy/proxy3.json'
            ];
            
            let allProxies = [];
            
            for (const file of proxyFiles) {
                try {
                    const response = await fetch(file);
                    if (response.ok) {
                        const proxies = await response.json();
                        allProxies = allProxies.concat(proxies);
                    }
                } catch (e) {
                    console.log(`Ошибка загрузки ${file}:`, e);
                }
            }
            
            return allProxies;
        }
        
        // ========== ПРОВЕРКА ПРОКСИ ==========
        async function checkProxy(proxy) {
            // Тут можно добавить реальную проверку через какой-то API
            // Для демо считаем 70% прокси рабочими
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(Math.random() > 0.3);
                }, 500);
            });
        }
        
        // ========== ПОЛУЧЕНИЕ РАБОЧЕГО ПРОКСИ ==========
        async function getWorkingProxy() {
            const allProxies = await loadProxiesFromFiles();
            
            if (allProxies.length === 0) {
                return null;
            }
            
            // Перемешиваем
            const shuffled = allProxies.sort(() => 0.5 - Math.random());
            
            // Проверяем первые 10
            const toCheck = shuffled.slice(0, 10);
            
            for (const proxy of toCheck) {
                const isWorking = await checkProxy(proxy);
                if (isWorking) {
                    return proxy;
                }
            }
            
            return null;
        }
        
        // ========== РАБОТА С JSONBIN ==========
        async function loadUsers() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                return data.record?.users || {};
            } catch {
                return {};
            }
        }
        
        async function saveUsers(users) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ users })
                });
            } catch (e) {
                console.log('Ошибка сохранения:', e);
            }
        }
        
        // ========== ОТПРАВКА СООБЩЕНИЙ В ТЕЛЕГРАМ ==========
        async function sendTelegramMessage(chatId, text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.log('Ошибка отправки:', e);
            }
        }
        
        // ========== ГЛАВНАЯ СТРАНИЦА ==========
        async function showMain() {
            const userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || 'user';
            
            if (!userId) {
                document.getElementById('app').innerHTML = '<div class="card">❌ Открой через Telegram</div>';
                return;
            }
            
            const users = await loadUsers();
            const userData = users[userId] || { lastGet: 0, count: 0 };
            
            const now = Date.now();
            const fiveDays = 5 * 24 * 60 * 60 * 1000;
            const timeLeft = (userData.lastGet + fiveDays) - now;
            
            let html = `
                <div class="card">
                    <h1>🌐 Proxy Bot</h1>
                    <p style="color:#94a3b8;">Привет, @${username}!</p>
                    
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value">${userData.count || 0}</div>
                            <div>Получено</div>
                        </div>
                    </div>
            `;
            
            if (timeLeft <= 0 || !userData.lastGet) {
                html += `
                    <div class="timer">
                        <div class="timer-value">✅</div>
                        <div>Можно взять прокси</div>
                    </div>
                    <button class="btn" onclick="getProxy()">🎁 Получить прокси</button>
                `;
            } else {
                const days = Math.floor(timeLeft / (24*60*60*1000));
                const hours = Math.floor((timeLeft % (24*60*60*1000)) / (60*60*1000));
                
                html += `
                    <div class="timer">
                        <div class="timer-value">${days}д ${hours}ч</div>
                        <div>До следующего</div>
                    </div>
                    <button class="btn" disabled>⏳ Подождите</button>
                    <div class="warning">Новый прокси через ${days} дня</div>
                `;
            }
            
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
        }
        
        // ========== ПОЛУЧЕНИЕ ПРОКСИ ==========
        window.getProxy = async function() {
            const userId = tg.initDataUnsafe?.user?.id;
            
            document.getElementById('app').innerHTML = `
                <div class="card" style="text-align:center; padding:40px;">
                    🔍 Ищем рабочий прокси...<br>
                    <small style="color:#94a3b8;">Проверяем прокси из файлов</small>
                </div>
            `;
            
            const proxy = await getWorkingProxy();
            
            if (!proxy) {
                document.getElementById('app').innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h2 style="color:#f87171;">❌ Нет рабочих прокси</h2>
                        <p>Попробуйте позже</p>
                        <button class="btn" onclick="showMain()">← Назад</button>
                    </div>
                `;
                return;
            }
            
            // Обновляем статистику
            const users = await loadUsers();
            users[userId] = {
                lastGet: Date.now(),
                count: (users[userId]?.count || 0) + 1
            };
            await saveUsers(users);
            
            // Отправляем уведомление админу
            await sendTelegramMessage(
                ADMIN_ID,
                `🎁 @${tg.initDataUnsafe?.user?.username} получил прокси\n` +
                `IP: ${proxy.ip}:${proxy.port}\n` +
                `Страна: ${proxy.country}`
            );
            
            // Показываем прокси
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h1>✅ Прокси найден!</h1>
                    
                    <div class="proxy-box">
                        <div class="proxy-ip">${proxy.ip}:${proxy.port}</div>
                        <div style="display:flex; justify-content:center; gap:15px; margin-top:15px; color:#94a3b8;">
                            <span>${proxy.country || 'Unknown'}</span>
                            <span>${proxy.type || 'HTTP'}</span>
                        </div>
                    </div>
                    
                    <button class="btn" onclick="copyProxy('${proxy.ip}:${proxy.port}')">📋 Копировать</button>
                    <button class="btn" onclick="showMain()" style="background:#334155;">← На главную</button>
                    
                    <div style="text-align:center; margin-top:20px; color:#94a3b8; font-size:14px;">
                        ✅ Прокси проверен и работает<br>
                        Следующий можно взять через 5 дней
                    </div>
                </div>
            `;
        };
        
        // ========== КОПИРОВАНИЕ ==========
        window.copyProxy = function(proxy) {
            navigator.clipboard?.writeText(proxy);
            tg.showPopup({ 
                title: '✅ Скопировано', 
                message: 'Прокси скопирован в буфер обмена'
            });
        };
        
        // ========== СТАРТ ==========
        showMain();
    </script>
</body>
</html>
